[package]
name = "p2p-gui"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1"
dirs = "5"
eframe = { version = "0.35", default-features = false, features = ["default_fonts", "glow"] }
getrandom = "0.2"
p2p-core = { path = "../p2p-core" }
rfd = "0.17.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["net", "rt", "sync", "time"] }
